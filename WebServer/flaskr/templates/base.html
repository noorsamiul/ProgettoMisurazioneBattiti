<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - BattitiCardiaci</title>
    
    <!-- Link Bootstrap CSS (CORRETTO) -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    
    <!-- Tuo CSS personalizzato -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        /* Un tocco di stile extra rapido */
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body class="text-dark">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">❤️ BattitiCardiaci</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('homepage') }}">Home</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto">
        {% if g.user %}
          <li class="nav-item">
            <span class="nav-link text-info">👋 Ciao, {{ g.user.username }}</span>
          </li>
          <li class="nav-item">
            <a class="nav-link btn btn-outline-light btn-sm ms-lg-2" href="{{ url_for('auth.logout') }}">Log Out</a>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('auth.register') }}">Registrati</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('auth.login') }}">Log In</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<main class="container py-5">
    <!-- Questo div contiene tutto il contenuto delle pagine figlie -->
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <header class="mb-4 text-center">
                {% block header %}{% endblock %}
            </header>

            {% block content %}{% endblock %}
        </div>
    </div>
</main>

<footer class="text-secondary text-center py-4">
    <hr class="container">
    <small>© 2026 BattitiCardiaci</small>
</footer>

<!-- Script Bootstrap JS (CORRETTO) -->
<script src="https://jsdelivr.net"></script>
</body>
</html>
