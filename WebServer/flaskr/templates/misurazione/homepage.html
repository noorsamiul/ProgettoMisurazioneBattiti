{% extends "base.html" %}


{% block title %}Home{% endblock %}


{% block header %}
<h1 class="display-5">Ciao, {{ username }}</h1>
<p class="text-muted">Benvenuto nel sistema di monitoraggio battiti cardiaci</p>
{% endblock %}


{% block content %}


<div class="row g-4">


    <!-- SINISTRA: MISURAZIONE -->
    <div class="col-12 col-lg-6">
        <div class="card shadow p-4 text-center">


            <div id="bpm" class="display-6 text-primary mb-3">
                --- BPM
            </div>


            <form method="POST" action="{{ url_for('homepage') }}">
                <input type="hidden" id="input_medi" name="bpm_medi">
                <input type="hidden" id="input_massimi" name="bpm_massimi">
                <input type="hidden" id="input_minimi" name="bpm_minimi">


                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="timer" class="badge bg-secondary">0s</span>
                </div>


                <div class="d-flex gap-2 justify-content-center flex-wrap">
                    <button type="button" class="btn btn-success" onclick="start()">Avvio</button>
                    <button type="button" class="btn btn-warning" onclick="stop()">Stop</button>
                    <button type="submit" class="btn btn-primary">Salva</button>
                </div>
            </form>


        </div>
    </div>


    <!-- DESTRA: RISULTATO -->
    <div class="col-12 col-lg-6">
        <div class="card shadow p-4">


            <h4 class="mb-3">Stato del tuo battito</h4>


            <p id="resultText" class="text-muted">
                Avvia una misurazione per vedere il risultato.
            </p>


            <h5 id="resultStatus"></h5>


        </div>
    </div>

</div>


<script>
let interval = null;
let time = 0;
let readings = [];

function start() {
    if (interval) return;

    readings = [];
    time = 0;

    interval = setInterval(() => {
        time++;

        document.getElementById("timer").innerText = time + "s";

        let bpm = Math.floor(Math.random() * 40) + 60;
        readings.push(bpm);

        document.getElementById("bpm").innerText = bpm + " BPM";


        if (time >= 20) stop();


    }, 1000);
}

function stop() {
    clearInterval(interval);
    interval = null;

    if (readings.length === 0) return;

    const max  = Math.max(...readings);
    const min  = Math.min(...readings);
    const medi = Math.round(readings.reduce((a,b) => a+b, 0) / readings.length);

    document.getElementById("input_massimi").value = max;
    document.getElementById("input_minimi").value  = min;
    document.getElementById("input_medi").value    = medi;

    document.getElementById("bpm").innerText =
        `Max: ${max} | Med: ${medi} | Min: ${min}`;

    checkBPM(max, medi, min);
}


function checkBPM(max, med, min) {
    let text = "";
    let status = "";

    if (med >= 60 && med <= 100 && max < 100) {
        text = "Il tuo battito è nella norma.";
        status = "🟢 NORMALE";
    }
    else if ((med >= 50 && med < 60) || (med > 100 && med <= 120)) {
        text = "Battito leggermente irregolare.";
        status = "🟡 ATTENZIONE";
    }
    else {
        text = "Battito fuori norma.";
        status = "🔴 CRITICO";
    }

    document.getElementById("resultText").innerText = text;
    document.getElementById("resultStatus").innerText = status;
}
</script>


{% endblock %}
