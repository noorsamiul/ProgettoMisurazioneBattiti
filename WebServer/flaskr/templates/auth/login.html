<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi — Battiti Cardiaci</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


        :root {
            --bg: #0d0d0f;
            --surface: #16161a;
            --border: #2a2a30;
            --accent: #c8a96e;
            --accent-dim: rgba(200,169,110,0.15);
            --text: #e8e6e1;
            --muted: #7a7870;
            --error: #e05c5c;
            --success: #5cb870;
        }


        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,169,110,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(100,80,160,0.05) 0%, transparent 60%);
        }


        .card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 3rem 2.5rem;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }


        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }


        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            text-align: center;
            margin-bottom: 2.5rem;
        }


        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 0.4rem;
        }


        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }


        .divider {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin-bottom: 2rem;
        }


        .alert {
            background: rgba(224,92,92,0.1);
            border: 1px solid rgba(224,92,92,0.3);
            border-radius: 2px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--error);
            margin-bottom: 1.5rem;
        }


        .field {
            margin-bottom: 1.4rem;
        }


        label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }


        input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0.8rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }


        input:focus {
            border-color: var(--accent);
            background: var(--accent-dim);
        }


        button[type="submit"] {
            width: 100%;
            background: var(--accent);
            color: #0d0d0f;
            border: none;
            border-radius: 2px;
            padding: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.1s;
        }


        button[type="submit"]:hover { opacity: 0.85; }
        button[type="submit"]:active { transform: scale(0.99); }


        .footer-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.82rem;
            color: var(--muted);
        }


        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }


        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Battiti Cardiaci</div>
        <h1>Bentornato</h1>
        <p class="subtitle">Accedi al tuo account</p>
        <div class="divider"></div>


        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}


        <form method="POST">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Accedi</button>
        </form>


        <p class="footer-link">Non hai un account? <a href="{{ url_for('registrazione') }}">Registrati</a></p>
    </div>
</body>
</html>
