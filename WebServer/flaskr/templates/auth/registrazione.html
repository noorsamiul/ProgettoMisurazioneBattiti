<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <!-- CSS di Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Crea Account</h2>
                        
                        {% with messages = get_flashed_messages() %}
                          {% if messages %}
                            {% for message in messages %}
                              <div class="alert alert-danger">{{ message }}</div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form action="{{ url_for('register') }}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control" placeholder="Inserisci username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Inserisci password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Registrati</button>
                        </form>
                        <hr>
                        <p class="text-center">Hai già un account? <a href="{{ url_for('login') }}">Accedi</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
